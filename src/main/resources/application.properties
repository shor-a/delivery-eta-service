spring.application.name=delivery-eta-service
server.port=8080

# ETA computation tuning
eta.waypoint-count=20
eta.simulation-iterations=200
eta.history-window-size=500

# H2 in-memory database (zone reverse-geocoding)
spring.datasource.url=jdbc:h2:mem:etadb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Enable Tomcat MBean registry so tomcat_threads_* metrics are exposed
server.tomcat.mbeanregistry.enabled=true


# Actuator
management.endpoints.web.exposure.include=health,info,prometheus,metrics,startup
management.endpoint.health.show-details=always
management.metrics.tags.application=${spring.application.name}

# Swagger UI: http://localhost:8080/swagger-ui.html
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.try-it-out-enabled=true
