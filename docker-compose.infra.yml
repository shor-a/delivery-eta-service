# Infrastructure compose file — lives at project root
# Manages: Prometheus + Grafana only.
# The delivery-service app is in docker-compose.app.yml.
services:
  # Prometheus
  # Scrapes delivery-service /actuator/prometheus every 100ms.
  # Also acts as remote-write receiver for k6 metrics.
  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: prometheus
    ports:
      - "9090:9090"
    mem_limit: 512m
    mem_reservation: 256m
    cpus: "1.0"
    # deploy block: honoured by Docker Swarm / Docker Compose v2 (ignored by podman-compose)
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=2h" # keep 2h — enough for a load test session
      - "--web.enable-remote-write-receiver" # accepts k6 push metrics
      - "--web.enable-lifecycle" # allows hot-reload via POST /-/reload
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - eta-net
    restart: unless-stopped

  # Grafana
  # Auto-provisions Prometheus datasource and the load-test dashboard.
  grafana:
    image: grafana/grafana:10.4.2
    container_name: grafana
    ports:
      - "3000:3000"
    mem_limit: 256m
    mem_reservation: 128m
    cpus: "0.5"
    # deploy block: honoured by Docker Swarm / Docker Compose v2 (ignored by podman-compose)
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 128M
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/delivery-eta-loadtest.json
      GF_FEATURE_TOGGLES_ENABLE: "ngalert"
    volumes:
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - eta-net
    restart: unless-stopped

volumes:
  prometheus-data:
  grafana-data:

networks:
  eta-net:
    name: eta-net
    driver: bridge
